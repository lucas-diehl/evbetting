name: golf-ev-alerts
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: golf-alerts
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R packages
        shell: Rscript {0}
        run: install.packages(c("data.table", "httr2"))
      - name: Run scanner
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
        run: Rscript alert_cloud.R
      - name: Persist ledger
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add -A golf_picks || true
          git commit -m "ledger $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push || echo "push skipped"
